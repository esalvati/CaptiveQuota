name: Dependency scan
on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  schedule:
    - cron: '0 3 * * 0' # weekly on Sunday at 03:00 UTC

jobs:
  pip-audit:
    name: pip-audit
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install pip-audit
        run: python -m pip install --upgrade pip pip-audit

      - name: Run pip-audit against requirements
        run: |
          if [ -f service/requirements.txt ]; then
            pip-audit -r service/requirements.txt --progress-spinner=off || (echo "Vulnerabilities found" && exit 1)
          else
            echo "No requirements file found at service/requirements.txt" && exit 0
          fi
